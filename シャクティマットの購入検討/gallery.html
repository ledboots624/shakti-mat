<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ギャラリー - シャクティマットの購入検討</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', 'Noto Sans JP', sans-serif; background: #f5f7fa; color: #2d3748; line-height: 1.7; }
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #e2e8f0; padding: 24px 40px; display: flex; align-items: center; gap: 20px; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #fff; background: rgba(255,255,255,0.12); text-decoration: none; font-size: 0.85em; font-weight: 600; padding: 6px 16px; border-radius: 8px; transition: background 0.2s; }
  .back-btn:hover { background: rgba(255,255,255,0.22); }
  .header h1 { font-size: 1.3em; flex: 1; }
  .container { max-width: 1100px; margin: 0 auto; padding: 30px 20px; }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; }
  .gallery-item { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); transition: transform 0.2s, box-shadow 0.2s; }
  .gallery-item:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
  .gallery-item img { width: 100%; height: auto; display: block; cursor: pointer; }
  .gallery-caption { padding: 16px 20px; }
  .gallery-caption h3 { font-size: 1.05em; color: #2d3748; margin-bottom: 4px; }
  .gallery-caption p { font-size: 0.88em; color: #718096; }
  .footer { background: #1a202c; color: #a0aec0; text-align: center; padding: 24px; font-size: 0.85em; margin-top: 40px; }
  .footer a { color: #63b3ed; text-decoration: none; }
  .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; cursor: pointer; justify-content: center; align-items: center; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; }
  @media (max-width: 768px) { .gallery-grid { grid-template-columns: 1fr; } .header { padding: 16px 20px; } }
</style>
</head>
<body>
<div class="header">
  <a href="./index.html" class="back-btn">← トップに戻る</a>
  <h1>可視化ギャラリー</h1>
</div>
<div class="container">
  <div class="gallery-grid">
<div class="gallery-item"><img src="./diagram.png" alt="関係図" onclick="openLightbox(this)"><div class="gallery-caption"><h3>関係図</h3><p>テーマの主要要素と関係性を可視化</p></div></div><div class="gallery-item"><img src="./visuals/mindmap.png" alt="マインドマップ" onclick="openLightbox(this)"><div class="gallery-caption"><h3>マインドマップ</h3><p>テーマの全体構造を放射状に整理</p></div></div>
<div class="gallery-item"><img src="./visuals/matrix.png" alt="比較マトリクス" onclick="openLightbox(this)"><div class="gallery-caption"><h3>比較マトリクス</h3><p>要素の多軸比較表</p></div></div>
  </div>
</div>
<div class="footer">
  <a href="./index.html">トップページに戻る</a>
</div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="">
</div>
<script>
function openLightbox(el) { var lb = document.getElementById('lightbox'); document.getElementById('lightbox-img').src = el.src; lb.classList.add('active'); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
